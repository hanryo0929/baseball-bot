<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baseball-Plan 管理画面</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #0a0f1e; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; padding: 40px 20px; }
  .logo { font-size: 3rem; margin-bottom: 8px; }
  h1 { font-size: 1.8rem; font-weight: 900; color: #4ade80; margin-bottom: 8px; }
  p { color: #94a3b8; margin-bottom: 40px; }
  .btn { display: inline-block; background: #4ade80; color: #0a0f1e; padding: 14px 32px; border-radius: 12px; font-weight: 700; font-size: 1rem; text-decoration: none; cursor: pointer; border: none; margin: 8px; transition: transform 0.2s, opacity 0.2s; }
  .btn:hover { transform: translateY(-2px); opacity: 0.9; }
  .btn-outline { background: transparent; border: 2px solid #4ade80; color: #4ade80; }
  #result { margin-top: 20px; padding: 16px; background: #1e293b; border-radius: 12px; display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">⚾</div>
  <h1>Baseball-Plan Bot</h1>
  <p>亀岡太郎グループ 日程調整自動化システム</p>
  <div style="margin-bottom:24px">
    <div style="font-size:0.75rem;color:#64748b;margin-bottom:12px;letter-spacing:0.05em">── 動作確認 ──</div>
    <button class="btn btn-outline" onclick="sendTestLine()">📨 疎通テスト送信</button>
  </div>
  <div style="margin-bottom:24px">
    <div style="font-size:0.75rem;color:#64748b;margin-bottom:12px;letter-spacing:0.05em">── 自動送信のテスト ──</div>
    <button class="btn" onclick="testScheduleMessage()">🗓 毎月5日メッセージを今すぐ送信</button>
    <button class="btn" style="background:#fbbf24;color:#0a0f1e" onclick="testReminderMessage()">⚠️ 催促メッセージを今すぐ送信</button>
  </div>
  <div style="margin-bottom:24px">
    <div style="font-size:0.75rem;color:#64748b;margin-bottom:12px;letter-spacing:0.05em">── 日程管理 ──</div>
    <button class="btn btn-outline" onclick="createTest()">📅 今月の日程ページを作成</button>
  </div>
  <div id="result"></div>
</div>
<script>
async function createTest() {
  const res = await fetch('/api/create-test', { method: 'POST' });
  const data = await res.json();
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.innerHTML = `✅ 作成完了！<br><a href="${data.url}" style="color:#4ade80">${data.url}</a>`;
}
async function sendTestLine() {
  await fetch('/api/send-test-line', { method: 'POST' });
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.innerHTML = '✅ LINEに疎通テストメッセージを送信しました！';
}
async function testScheduleMessage() {
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.innerHTML = '送信中...';
  await fetch('/api/test-schedule-message', { method: 'POST' });
  el.innerHTML = '✅ 毎月5日の日程調整メッセージをLINEに送信しました！';
}
async function testReminderMessage() {
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.innerHTML = '送信中...';
  await fetch('/api/test-reminder-message', { method: 'POST' });
  el.innerHTML = '✅ 催促メッセージをLINEに送信しました！';
}
</script>
</body>
</html>
